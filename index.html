<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahmad's Travel Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #060b14;
  --bg2:      #0c1220;
  --bg3:      #111a2e;
  --bg4:      #182238;
  --bg5:      #1f2c46;
  --sky:      #3a9bd5;
  --sky2:     #5fb8f0;
  --sand:     #e8c97a;
  --sand2:    #f5e4b0;
  --coral:    #f07060;
  --mint:     #4ecba0;
  --lavender: #9b7fe8;
  --rose:     #e87aaa;
  --text:     #eef2f8;
  --text2:    #7a8aaa;
  --text3:    #2e3a52;
  --radius:   12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* STAR FIELD BG */
.stars {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(58,155,213,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 80%, rgba(78,203,160,0.08) 0%, transparent 40%),
    radial-gradient(ellipse at 50% 50%, rgba(155,127,232,0.05) 0%, transparent 60%);
}
.star-dots {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 15% 12%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 32% 28%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 8%,  rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 18%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 88% 32%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 45%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 42% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 65%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 90%, rgba(255,255,255,0.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 5% 95%,  rgba(255,255,255,0.2) 0%, transparent 100%);
}

header, .stats-wrap, .tabs-wrap, .main, .modal-overlay, .lightbox { position: relative; z-index: 1; }

/* PHOTO STRIP */
.card-photos{display:flex;gap:4px;padding:4px;background:var(--bg3);overflow-x:auto;scrollbar-width:none;border-radius:var(--radius) var(--radius) 0 0;}
.card-photos:empty{display:none;}
.card-photos::-webkit-scrollbar{display:none;}
.thumb{width:72px;height:72px;object-fit:cover;border-radius:7px;cursor:pointer;flex-shrink:0;transition:transform .15s,opacity .15s;}
.thumb:hover{transform:scale(1.05);opacity:0.88;}
.thumb-add{width:72px;height:72px;border-radius:7px;border:1.5px dashed var(--bg5);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text3);font-size:20px;transition:all .2s;background:var(--bg2);flex-direction:column;gap:3px;}
.thumb-add:hover{border-color:var(--sky2);color:var(--sky2);}
.thumb-add span{font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.thumb-input{display:none;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.96);align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox-img{max-width:94vw;max-height:76vh;object-fit:contain;border-radius:10px;}
.lightbox-nav{display:flex;align-items:center;gap:20px;margin-top:16px;}
.lb-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--text2);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lb-btn:hover{border-color:var(--sky2);color:var(--sky2);}
.lb-close{position:fixed;top:18px;right:18px;background:var(--bg3);border:1px solid var(--bg4);color:var(--text2);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:501;}
.lb-close:hover{border-color:var(--coral);color:var(--coral);}
.lb-counter{font-size:12px;color:var(--text2);font-family:'Playfair Display',serif;letter-spacing:2px;}
.lb-del{background:rgba(240,112,96,.1);border:1px solid rgba(240,112,96,.25);color:var(--coral);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lb-del:hover{background:rgba(240,112,96,.2);}

/* PHOTO UPLOAD IN MODAL */
.photo-upload-area{border:1.5px dashed var(--bg5);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.photo-upload-area:hover{border-color:var(--sky2);}
.photo-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pua-icon{font-size:26px;margin-bottom:5px;}
.pua-text{font-size:12px;color:var(--text2);}
.modal-photo-previews{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.modal-thumb-wrap{position:relative;width:62px;height:62px;}
.modal-thumb{width:62px;height:62px;object-fit:cover;border-radius:8px;}
.modal-thumb-del{position:absolute;top:-5px;right:-5px;background:var(--coral);border:none;color:#fff;width:17px;height:17px;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* HEADER */
header { text-align: center; padding: 56px 20px 28px; }
.header-eyebrow {
  font-size: 10px; letter-spacing: 6px; text-transform: uppercase;
  color: var(--sky2); font-weight: 500; margin-bottom: 14px;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px, 8vw, 76px);
  font-weight: 900; line-height: 0.92; letter-spacing: -2px;
}
h1 .l1 { color: var(--sky2); display: block; }
h1 .l2 { color: var(--sand); display: block; font-style: italic; }
.header-sub {
  font-size: 12px; color: var(--text2); margin-top: 16px;
  letter-spacing: 3px; text-transform: uppercase;
}
.header-divider {
  width: 200px; height: 1px; margin: 20px auto 0;
  background: linear-gradient(to right, transparent, var(--sky), var(--sand), transparent);
}

/* WORLD COUNTER */
.world-counter {
  display: flex; justify-content: center; gap: 0;
  max-width: 600px; margin: 0 auto 32px;
  background: var(--bg2); border: 1px solid var(--bg4);
  border-radius: var(--radius); overflow: hidden;
}
.wc-item {
  flex: 1; text-align: center; padding: 16px 8px;
  border-right: 1px solid var(--bg4);
}
.wc-item:last-child { border-right: none; }
.wc-num {
  display: block;
  font-family: 'Playfair Display', serif;
  font-size: 30px; font-weight: 700; line-height: 1;
}
.wc-num.c1 { color: var(--sky2); }
.wc-num.c2 { color: var(--sand); }
.wc-num.c3 { color: var(--mint); }
.wc-num.c4 { color: var(--lavender); }
.wc-num.c5 { color: var(--rose); }
.wc-lbl {
  display: block; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text3); margin-top: 4px;
}

/* TABS */
.tabs-wrap {
  display: flex; justify-content: center; gap: 6px;
  padding: 0 16px; margin-bottom: 28px; flex-wrap: wrap;
}
.tab-btn {
  background: var(--bg2); border: 1px solid var(--bg4);
  color: var(--text2); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
  padding: 9px 16px; border-radius: 30px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.tab-btn:hover { color: var(--text); border-color: var(--bg5); }
.tab-btn.t-countries.active   { background: rgba(58,155,213,0.12);  border-color: var(--sky);      color: var(--sky2); }
.tab-btn.t-cities.active      { background: rgba(232,201,122,0.1);  border-color: var(--sand);     color: var(--sand2); }
.tab-btn.t-landmarks.active   { background: rgba(78,203,160,0.1);   border-color: var(--mint);     color: var(--mint); }
.tab-btn.t-beaches.active     { background: rgba(240,112,96,0.1);   border-color: var(--coral);    color: var(--coral); }
.tab-btn.t-hotels.active      { background: rgba(155,127,232,0.1);  border-color: var(--lavender); color: var(--lavender); }
.tab-btn.t-food.active        { background: rgba(232,122,170,0.1);  border-color: var(--rose);     color: var(--rose); }

/* MAIN */
.main { max-width: 980px; margin: 0 auto; padding: 0 16px 80px; }
.section { display: none; }
.section.active { display: block; }

/* FILTER ROW */
.filter-row {
  display: flex; gap: 10px; margin-bottom: 22px;
  align-items: center; justify-content: space-between; flex-wrap: wrap;
}
.filter-pills { display: flex; gap: 5px; flex-wrap: wrap; }
.pill {
  padding: 5px 13px; border-radius: 20px; font-size: 11px;
  letter-spacing: 0.5px; cursor: pointer; border: 1px solid transparent;
  transition: all 0.18s; font-weight: 400;
}
.pill.all       { background: var(--bg3); border-color: var(--bg5); color: var(--text2); }
.pill.visited   { background: rgba(78,203,160,0.08);  border-color: rgba(78,203,160,0.2);  color: #4ecba0; }
.pill.want      { background: rgba(58,155,213,0.08);  border-color: rgba(58,155,213,0.2);  color: #5fb8f0; }
.pill.bucket    { background: rgba(232,201,122,0.08); border-color: rgba(232,201,122,0.2); color: #e8c97a; }
.pill.planning  { background: rgba(155,127,232,0.08); border-color: rgba(155,127,232,0.2); color: #b09ee8; }
.pill.again     { background: rgba(240,112,96,0.08);  border-color: rgba(240,112,96,0.2);  color: #f07060; }
.pill.active-filter, .pill:hover { filter: brightness(1.35); border-color: currentColor; }

.add-btn {
  background: var(--bg3); border: 1px solid var(--bg5);
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500; padding: 8px 18px;
  border-radius: 8px; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.add-btn:hover { background: var(--bg4); }

/* GRID */
.entries-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

/* CARD */
.entry-card {
  background: var(--bg2); border: 1px solid var(--bg4);
  border-radius: var(--radius); overflow: hidden;
  transition: transform 0.2s, border-color 0.2s; position: relative;
}
.card-body { padding: 18px; }
.entry-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.entry-card.visited::before  { background: linear-gradient(to right, transparent, #4ecba0, transparent); }
.entry-card.want::before     { background: linear-gradient(to right, transparent, #5fb8f0, transparent); }
.entry-card.bucket::before   { background: linear-gradient(to right, transparent, #e8c97a, transparent); }
.entry-card.planning::before { background: linear-gradient(to right, transparent, #b09ee8, transparent); }
.entry-card.again::before    { background: linear-gradient(to right, transparent, #f07060, transparent); }
.entry-card:hover { transform: translateY(-3px); border-color: var(--bg5); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700; color: var(--text);
  line-height: 1.2; flex: 1;
}
.card-country { font-size: 12px; color: var(--text2); font-weight: 300; margin-top: 1px; }
.card-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
.entry-card:hover .card-actions { opacity: 1; }
.card-act-btn {
  background: var(--bg3); border: 1px solid var(--bg4);
  color: var(--text3); width: 28px; height: 28px;
  border-radius: 6px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.card-act-btn:hover { color: var(--text); border-color: var(--bg5); }
.card-act-btn.del:hover { color: var(--coral); border-color: rgba(240,112,96,0.3); }

.card-meta { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; align-items: center; }
.status-badge {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 9px; border-radius: 20px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 4px;
}
.status-badge.visited  { background: rgba(78,203,160,0.12);  color: #4ecba0; }
.status-badge.want     { background: rgba(58,155,213,0.12);  color: #5fb8f0; }
.status-badge.bucket   { background: rgba(232,201,122,0.12); color: #e8c97a; }
.status-badge.planning { background: rgba(155,127,232,0.12); color: #b09ee8; }
.status-badge.again    { background: rgba(240,112,96,0.12);  color: #f07060; }
.status-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

.budget-badge {
  font-size: 11px; color: var(--text2);
  background: var(--bg3); border: 1px solid var(--bg4);
  padding: 2px 8px; border-radius: 6px;
}

.card-detail {
  font-size: 12px; color: var(--text2); margin-bottom: 6px;
  display: flex; align-items: flex-start; gap: 6px; line-height: 1.5;
}
.card-detail-icon { flex-shrink: 0; font-size: 12px; margin-top: 1px; }

.card-rating { display: flex; gap: 2px; margin-bottom: 8px; }
.star { font-size: 13px; color: var(--text3); cursor: pointer; transition: color 0.1s; }
.star.filled { color: var(--sand); }
.star:hover { color: var(--sand2); }

.card-section-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--text3); margin: 8px 0 3px; font-weight: 500;
}
.card-block {
  font-size: 12px; color: var(--text2); line-height: 1.6;
  background: var(--bg3); border: 1px solid var(--bg4);
  border-radius: 8px; padding: 8px 10px; margin-bottom: 6px;
}
.card-block:empty { display: none; }
.card-thoughts {
  font-size: 13px; color: var(--text2); line-height: 1.6;
  font-style: italic; border-top: 1px solid var(--bg4);
  padding-top: 9px; margin-top: 6px;
}
.card-thoughts:empty { display: none; }

.todo-list { list-style: none; }
.todo-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: var(--text2); padding: 3px 0;
}
.todo-item::before {
  content: ''; width: 5px; height: 5px;
  border: 1px solid var(--sky2); border-radius: 50%; flex-shrink: 0;
}

.empty-state {
  grid-column: 1 / -1; text-align: center; padding: 64px 20px; color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.35; }
.empty-state p { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2); border: 1px solid var(--bg4);
  border-radius: 16px; padding: 28px 26px;
  width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto;
  animation: modalIn 0.25s cubic-bezier(0.34,1.3,0.64,1) forwards;
}
@keyframes modalIn {
  from { opacity:0; transform:scale(0.88) translateY(24px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700; color: var(--text);
  margin-bottom: 22px;
}
.modal-title span { color: var(--sky2); font-style: italic; }

.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 6px; font-weight: 500;
}
.form-input, .form-select, .form-textarea {
  width: 100%; background: var(--bg3);
  border: 1px solid var(--bg4); border-radius: 8px;
  color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; padding: 10px 14px;
  transition: border-color 0.2s; outline: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--bg5); }
.form-select option { background: var(--bg3); }
.form-textarea { resize: vertical; min-height: 68px; line-height: 1.6; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.section-divider {
  font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text3); margin: 18px 0 12px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
}
.section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--bg4);
}

.rating-input { display: flex; gap: 6px; }
.rating-star {
  font-size: 22px; color: var(--text3); cursor: pointer;
  transition: color 0.1s; user-select: none;
}
.rating-star.filled { color: var(--sand); }

.todo-input-wrap { display: flex; gap: 8px; }
.todo-input-wrap .form-input { flex: 1; }
.todo-add-btn {
  background: var(--bg3); border: 1px solid var(--bg4);
  color: var(--sky2); width: 40px; border-radius: 8px;
  cursor: pointer; font-size: 20px; font-weight: 300;
  transition: all 0.15s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.todo-add-btn:hover { border-color: var(--sky); }
.todo-items-list { margin-top: 8px; }
.todo-form-item {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--text2); padding: 5px 0;
  border-bottom: 1px solid var(--bg4);
}
.todo-form-item:last-child { border-bottom: none; }
.todo-remove {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; padding: 2px 4px;
  transition: color 0.15s;
}
.todo-remove:hover { color: var(--coral); }

.modal-actions { display: flex; gap: 10px; margin-top: 22px; }
.btn-save {
  flex: 1; background: var(--sky); border: none; color: #fff;
  font-family: 'Inter', sans-serif; font-size: 13px;
  font-weight: 500; padding: 12px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
}
.btn-save:hover { background: var(--sky2); }
.btn-cancel {
  background: var(--bg3); border: 1px solid var(--bg4);
  color: var(--text2); font-family: 'Inter', sans-serif;
  font-size: 13px; padding: 12px 20px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--bg5); color: var(--text); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg5); }
.backup-bar{max-width:980px;margin:0 auto;padding:10px 16px 0;display:flex;justify-content:space-between;align-items:center;gap:8px;position:relative;z-index:1;}
.backup-btn{background:var(--bg2);border:1px solid var(--bg4);color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.backup-btn:hover{border-color:var(--sky2);color:var(--sky2);}
.sync-status{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:var(--mint);}
.sync-dot.err{background:var(--coral);}
.sync-dot.loading{background:var(--sand);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="stars"></div>
<div class="star-dots"></div>

<header>
  <p class="header-eyebrow">Ahmad's Travel Journal</p>
  <h1>
    <span class="l1">Wander</span>
    <span class="l2">& Explore</span>
  </h1>
  <p class="header-sub">Countries · Cities · Landmarks · Beaches · Hotels · Food</p>
  <div class="header-divider"></div>
</header>

<div class="backup-bar">
  <div class="sync-status"><div class="sync-dot loading" id="sync-dot"></div><span id="sync-label">Connecting...</span></div>
  <div style="display:flex;gap:8px;">
    <button class="backup-btn" onclick="exportData()">⬇ Export</button>
    <button class="backup-btn" onclick="document.getElementById('import-input').click()">⬆ Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)"/>
  </div>
</div>
</div>

<div class="world-counter" style="padding:0 16px; max-width:660px; margin:0 auto 32px;">

      <textarea class="form-textarea" id="f-memories" placeholder="A memory, a moment, something to remember..."></textarea>

<script>
var data = { countries:[], cities:[], landmarks:[], beaches:[], hotels:[], food:[] };
var currentTab = 'countries';
var currentFilter = { countries:'all', cities:'all', landmarks:'all', beaches:'all', hotels:'all', food:'all' };
var editRating = 0;
var editingId = null;
var todoItems = [];
var modalPhotos = [];
var lbPhotos = []; var lbIndex = 0; var lbCat = ''; var lbEntryId = '';

var statusLabels = { visited:'Visited', want:'Want to Visit', bucket:'Bucket List', planning:'Planning', again:'To Go Again' };
var tabLabels = { countries:'Country', cities:'City', landmarks:'Landmark', beaches:'Beach / Nature', hotels:'Hotel / Stay', food:'Food Spot' };
var tabIcons  = { countries:'🌍', cities:'🏙️', landmarks:'🗺️', beaches:'🏖️', hotels:'🏨', food:'🍜' };

var SB_URL='https://oludgjpyrennjfkizmas.supabase.co';
var SB_KEY='sb_publishable_iPOfDAFeSbuFD95Ibnr05w_U9fQHHvJ';
function sbFetch(path,opts){
  return fetch(SB_URL+path,Object.assign({headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}},opts));
}

function saveLocal(){try{localStorage.setItem('ahmads-travel',JSON.stringify(data));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function setSyncStatus(state,msg){
  var dot=document.getElementById('sync-dot');
  var lbl=document.getElementById('sync-label');
  if(!dot||!lbl)return;
  dot.className='sync-dot '+state;
  lbl.textContent=msg;
}

async function load(){
  setSyncStatus('loading','Connecting...');
  try{
    var res=await sbFetch('/rest/v1/travel?select=*&order=created_at.desc');
    if(!res.ok)throw new Error();
    var rows=await res.json();
    data={countries:[],cities:[],landmarks:[],beaches:[],hotels:[],food:[]};
    rows.forEach(function(r){
      if(data[r.cat]!==undefined) data[r.cat].push({
        id:r.id,title:r.title,status:r.status,budget:r.budget||'',
        date:r.date_visited||'',who:r.who_with||'',rating:r.rating||0,
        thoughts:r.thoughts||'',memories:r.memories||'',tips:r.tips||'',
        todos:r.todos?JSON.parse(r.todos):[],
        photos:r.photos?JSON.parse(r.photos):[]
      });
    });
    saveLocal();
    setSyncStatus('ok','Synced');
  }catch(e){
    setSyncStatus('err','Offline — local data');
    try{var s=localStorage.getItem('ahmads-travel');if(s)data=JSON.parse(s);}catch(ex){}
  }
}

function switchTab(cat, btn) {
  currentTab = cat;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('sec-'+cat).classList.add('active');
  renderSection(cat);
}

function setFilter(cat, status, el) {
  currentFilter[cat] = status;
  el.closest('.filter-pills').querySelectorAll('.pill').forEach(function(p){ p.classList.remove('active-filter'); });
  el.classList.add('active-filter');
  renderSection(cat);
}

function renderSection(cat) {
  var sec = document.getElementById('sec-'+cat);
  var filter = currentFilter[cat];
  var entries = data[cat];
  var filtered = filter === 'all' ? entries : entries.filter(function(e){ return e.status === filter; });

  var statuses = [
    {k:'all',     l:'All'},
    {k:'visited', l:'Visited'},
    {k:'want',    l:'Want to Go'},
    {k:'bucket',  l:'Bucket List'},
    {k:'planning',l:'Planning'},
    {k:'again',   l:'To Go Again'}
  ];

  var html = '<div class="filter-row"><div class="filter-pills">';
  statuses.forEach(function(s){
    var cls = 'pill ' + (s.k==='all'?'all':s.k) + (currentFilter[cat]===s.k?' active-filter':'');
    html += '<span class="'+cls+'" onclick="setFilter(\''+cat+'\',\''+s.k+'\',this)">'+s.l+'</span>';
  });
  html += '</div><button class="add-btn" onclick="openModal(\''+cat+'\',null)">+ Add</button></div>';
  html += '<div class="entries-grid">';

  if (!filtered.length) {
    html += '<div class="empty-state"><div class="empty-icon">'+tabIcons[cat]+'</div><p>No '+tabLabels[cat].toLowerCase()+'s logged yet</p></div>';
  } else {
    filtered.forEach(function(e){ html += renderCard(e, cat); });
  }
  html += '</div>';
  sec.innerHTML = html;
  updateStats();
}

function renderCard(e, cat) {
  var stars = '';
  for (var i=1;i<=5;i++) stars += '<span class="star'+(i<=e.rating?' filled':'')+'" onclick="quickRate(\''+cat+'\',\''+e.id+'\','+i+')">★</span>';

  var photos = e.photos || [];
  var photoStrip = '<div class="card-photos">';
  photos.forEach(function(p, idx){
    photoStrip += '<img class="thumb" src="'+p+'" loading="lazy" onclick="openLightbox(\''+cat+'\',\''+e.id+'\','+idx+')" alt="Photo"/>';
  });
  photoStrip += '<div class="thumb-add" onclick="triggerCardPhotoAdd(\''+cat+'\',\''+e.id+'\')"><span>📷</span><span>Add</span></div>';
  photoStrip += '<input type="file" class="thumb-input" id="cpi-'+e.id+'" accept="image/*" multiple onchange="handleCardPhotoAdd(event,\''+cat+'\',\''+e.id+'\')">';
  photoStrip += '</div>';

  var html = '<div class="entry-card '+e.status+'">';
  html += photoStrip;
  html += '<div class="card-body">';
  html += '<div class="card-top"><div><div class="card-title">'+esc(e.title)+'</div>';
  if (e.date||e.who) html += '<div class="card-country">'+(e.date?esc(e.date):'')+(e.date&&e.who?' · ':'')+( e.who?esc(e.who):'' )+'</div>';
  html += '</div><div class="card-actions">';
  html += '<button class="card-act-btn" onclick="openModal(\''+cat+'\',\''+e.id+'\')">✎</button>';
  html += '<button class="card-act-btn del" onclick="deleteEntry(\''+cat+'\',\''+e.id+'\')">✕</button>';
  html += '</div></div>';
  html += '<div class="card-meta">';
  html += '<span class="status-badge '+e.status+'"><span class="status-dot"></span>'+statusLabels[e.status]+'</span>';
  if (e.budget) html += '<span class="budget-badge">'+esc(e.budget)+'</span>';
  html += '</div>';
  html += '<div class="card-rating">'+stars+'</div>';
  if (e.thoughts) html += '<div class="card-thoughts">'+esc(e.thoughts)+'</div>';
  if (e.memories) { html += '<div class="card-section-label">Memory</div>'; html += '<div class="card-block">'+esc(e.memories)+'</div>'; }
  if (e.tips) { html += '<div class="card-section-label">Tips</div>'; html += '<div class="card-block">'+esc(e.tips)+'</div>'; }
  if (e.todos && e.todos.length) {
    html += '<div class="card-section-label">Still To Do</div><ul class="todo-list">';
    e.todos.forEach(function(t){ html += '<li class="todo-item">'+esc(t)+'</li>'; });
    html += '</ul>';
  }
  html += '</div></div>';
  return html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- SUPABASE STORAGE PHOTO HANDLING ----
async function uploadPhotoToStorage(file, entryId){
  var ext=file.name.split('.').pop()||'jpg';
  var path='travel/'+entryId+'/'+uid()+'.'+ext;
  var res=await fetch(SB_URL+'/storage/v1/object/photos/'+path,{
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type},
    body:file
  });
  if(!res.ok) throw new Error('Upload failed');
  return SB_URL+'/storage/v1/object/public/photos/'+path;
}
async function deletePhotoFromStorage(url){
  var path=url.split('/object/public/photos/')[1];
  if(!path)return;
  try{await fetch(SB_URL+'/storage/v1/object/photos/'+path,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});}catch(e){}
}

async function handlePhotoUpload(event){
  var files=Array.from(event.target.files);
  var tempId=editingId||('temp-'+uid());
  for(var i=0;i<files.length;i++){
    try{
      var url=await uploadPhotoToStorage(files[i],tempId);
      modalPhotos.push(url);
      renderModalPreviews();
    }catch(e){alert('Photo upload failed — check your connection');}
  }
  event.target.value='';
}
function renderModalPreviews(){
  var wrap=document.getElementById('modal-photo-previews');
  wrap.innerHTML='';
  modalPhotos.forEach(function(p,i){
    var w=document.createElement('div'); w.className='modal-thumb-wrap';
    var img=document.createElement('img'); img.className='modal-thumb'; img.src=p;
    var del=document.createElement('button'); del.className='modal-thumb-del'; del.textContent='✕';
    del.onclick=function(){ modalPhotos.splice(i,1); renderModalPreviews(); };
    w.appendChild(img); w.appendChild(del); wrap.appendChild(w);
  });
}
function triggerCardPhotoAdd(cat,id){ var inp=document.getElementById('cpi-'+id); if(inp)inp.click(); }
async function handleCardPhotoAdd(event,cat,id){
  var files=Array.from(event.target.files);
  var entry=data[cat].find(function(e){return e.id===id;});
  if(!entry)return;
  if(!entry.photos)entry.photos=[];
  for(var i=0;i<files.length;i++){
    try{
      var url=await uploadPhotoToStorage(files[i],id);
      entry.photos.push(url);
      try{await sbFetch('/rest/v1/travel?id=eq.'+id,{method:'PATCH',body:JSON.stringify({photos:JSON.stringify(entry.photos)})});}catch(ex){}
      saveLocal(); renderSection(cat);
    }catch(e){alert('Photo upload failed');}
  }
  event.target.value='';
}
function openLightbox(cat,id,idx){
  var entry=data[cat].find(function(e){return e.id===id;});
  if(!entry||!entry.photos||!entry.photos.length)return;
  lbPhotos=entry.photos; lbIndex=idx; lbCat=cat; lbEntryId=id;
  showLbPhoto(); document.getElementById('lightbox').classList.add('open');
}
function showLbPhoto(){
  document.getElementById('lb-img').src=lbPhotos[lbIndex];
  document.getElementById('lb-counter').textContent=(lbIndex+1)+' / '+lbPhotos.length;
}
function lbNav(dir){ lbIndex=(lbIndex+dir+lbPhotos.length)%lbPhotos.length; showLbPhoto(); }
async function lbDelete(){
  if(!confirm('Delete this photo?'))return;
  var entry=data[lbCat].find(function(e){return e.id===lbEntryId;});
  if(entry){
    var url=entry.photos[lbIndex];
    entry.photos.splice(lbIndex,1);
    await deletePhotoFromStorage(url);
    try{await sbFetch('/rest/v1/travel?id=eq.'+lbEntryId,{method:'PATCH',body:JSON.stringify({photos:JSON.stringify(entry.photos)})});}catch(ex){}
    saveLocal();
    if(!entry.photos.length){closeLightbox();renderSection(lbCat);return;}
    lbPhotos=entry.photos; lbIndex=Math.min(lbIndex,lbPhotos.length-1); showLbPhoto(); renderSection(lbCat);
  }
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});
var lbTouchX=null;
document.getElementById('lightbox').addEventListener('touchstart',function(e){lbTouchX=e.touches[0].clientX;},{passive:true});
document.getElementById('lightbox').addEventListener('touchend',function(e){
  if(lbTouchX===null)return; var dx=e.changedTouches[0].clientX-lbTouchX;
  if(Math.abs(dx)>50)lbNav(dx<0?1:-1); lbTouchX=null;
},{passive:true});
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbNav(-1); if(e.key==='ArrowRight')lbNav(1); if(e.key==='Escape')closeLightbox();
});

function addTodoItem() {
  var inp = document.getElementById('f-todo-input');
  var val = inp.value.trim();
  if (!val) return;
  todoItems.push(val);
  inp.value = '';
  renderTodoList();
}

document.getElementById('f-todo-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') { e.preventDefault(); addTodoItem(); }
});

function removeTodoItem(idx) {
  todoItems.splice(idx, 1);
  renderTodoList();
}

function renderTodoList() {
  var list = document.getElementById('todo-items-list');
  if (!todoItems.length) { list.innerHTML = ''; return; }
  var html = '';
  todoItems.forEach(function(t, i){
    html += '<div class="todo-form-item"><span>'+esc(t)+'</span><button class="todo-remove" onclick="removeTodoItem('+i+')">✕</button></div>';
  });
  list.innerHTML = html;
}

function openModal(cat, id) {
  editingId = id;
  todoItems = [];
  modalPhotos = [];
  document.getElementById('edit-cat').value = cat;
  document.getElementById('modal-cat-label').textContent = tabLabels[cat];

  if (id) {
    var e = data[cat].find(function(x){ return x.id===id; });
    document.getElementById('f-title').value    = e.title;
    document.getElementById('f-status').value   = e.status;
    document.getElementById('f-budget').value   = e.budget || '';
    document.getElementById('f-date').value     = e.date || '';
    document.getElementById('f-who').value      = e.who || '';
    document.getElementById('f-thoughts').value = e.thoughts || '';
    document.getElementById('f-memories').value = e.memories || '';
    document.getElementById('f-tips').value     = e.tips || '';
    editRating = e.rating || 0;
    todoItems = e.todos ? e.todos.slice() : [];
    modalPhotos = (e.photos || []).slice();
  } else {
    ['f-title','f-date','f-who','f-thoughts','f-memories','f-tips'].forEach(function(id){
      document.getElementById(id).value = '';
    });
    document.getElementById('f-status').value = 'visited';
    document.getElementById('f-budget').value = '';
    editRating = 0;
    todoItems = [];
    modalPhotos = [];
  }

  updateRatingStars(editRating);
  renderTodoList();
  renderModalPreviews();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('f-title').focus(); }, 100);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null; todoItems = []; modalPhotos = [];
}

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if (e.target === this) closeModal();
});

document.querySelectorAll('.rating-star').forEach(function(star){
  star.addEventListener('click', function(){
    editRating = parseInt(this.getAttribute('data-v'));
    updateRatingStars(editRating);
  });
  star.addEventListener('mouseover', function(){
    updateRatingStars(parseInt(this.getAttribute('data-v')));
  });
});
document.getElementById('rating-input').addEventListener('mouseleave', function(){
  updateRatingStars(editRating);
});

function updateRatingStars(val) {
  document.querySelectorAll('.rating-star').forEach(function(s){
    s.classList.toggle('filled', parseInt(s.getAttribute('data-v')) <= val);
  });
}

async function saveEntry() {
  var cat = document.getElementById('edit-cat').value;
  var title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  var entry = {
    id: editingId || uid(), title: title,
    status: document.getElementById('f-status').value,
    budget: document.getElementById('f-budget').value,
    date: document.getElementById('f-date').value.trim(),
    who: document.getElementById('f-who').value.trim(),
    rating: editRating,
    thoughts: document.getElementById('f-thoughts').value.trim(),
    memories: document.getElementById('f-memories').value.trim(),
    tips: document.getElementById('f-tips').value.trim(),
    todos: todoItems.slice(), photos: modalPhotos.slice()
  };
  var sbRow={id:entry.id,cat:cat,title:entry.title,status:entry.status,budget:entry.budget,date_visited:entry.date,who_with:entry.who,rating:entry.rating,thoughts:entry.thoughts,memories:entry.memories,tips:entry.tips,todos:JSON.stringify(entry.todos),photos:JSON.stringify(entry.photos)};
  try{
    if(editingId){
      await sbFetch('/rest/v1/travel?id=eq.'+editingId,{method:'PATCH',body:JSON.stringify(sbRow)});
      var idx=data[cat].findIndex(function(e){return e.id===editingId;});
      if(idx>-1)data[cat][idx]=entry;
    }else{
      await sbFetch('/rest/v1/travel',{method:'POST',body:JSON.stringify(sbRow)});
      data[cat].unshift(entry);
    }
  }catch(e){
    if(editingId){var idx=data[cat].findIndex(function(x){return x.id===editingId;});if(idx>-1)data[cat][idx]=entry;}
    else data[cat].unshift(entry);
  }
  saveLocal(); closeModal(); renderSection(cat);
}

async function deleteEntry(cat, id) {
  data[cat] = data[cat].filter(function(e){ return e.id!==id; });
  saveLocal(); renderSection(cat);
  try{await sbFetch('/rest/v1/travel?id=eq.'+id,{method:'DELETE'});}catch(e){}
}

async function quickRate(cat, id, r) {
  var e = data[cat].find(function(x){ return x.id===id; });
  if(!e)return;
  e.rating=r; saveLocal(); renderSection(cat);
  try{await sbFetch('/rest/v1/travel?id=eq.'+id,{method:'PATCH',body:JSON.stringify({rating:r})});}catch(ex){}
}

function updateStats() {
  var all = [].concat(data.countries, data.cities, data.landmarks, data.beaches, data.hotels, data.food);
  document.getElementById('st-total').textContent   = all.length;
  document.getElementById('st-visited').textContent = all.filter(function(e){ return e.status==='visited'||e.status==='again'; }).length;
  document.getElementById('st-want').textContent    = all.filter(function(e){ return e.status==='want'; }).length;
  document.getElementById('st-planning').textContent= all.filter(function(e){ return e.status==='planning'; }).length;
  document.getElementById('st-bucket').textContent  = all.filter(function(e){ return e.status==='bucket'; }).length;
}

function exportData(){
  var exp=JSON.parse(JSON.stringify(data));
  ['countries','cities','landmarks','beaches','hotels','food'].forEach(function(c){exp[c].forEach(function(e){e.photos=[];});});
  var blob=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ahmads-travel-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
async function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var imported=JSON.parse(e.target.result);
      if(imported.countries!==undefined){
        var cats=['countries','cities','landmarks','beaches','hotels','food'];
        for(var c=0;c<cats.length;c++){
          var cat=cats[c];
          for(var i=0;i<(imported[cat]||[]).length;i++){
            var item=imported[cat][i];
            try{await sbFetch('/rest/v1/travel',{method:'POST',body:JSON.stringify({id:item.id,cat:cat,title:item.title,status:item.status,budget:item.budget||'',date_visited:item.date||'',who_with:item.who||'',rating:item.rating||0,thoughts:item.thoughts||'',memories:item.memories||'',tips:item.tips||'',todos:JSON.stringify(item.todos||[])})});}catch(ex){}
          }
        }
        await load();renderSection(currentTab);
        alert('Data restored!');
      }
    }catch(err){alert('Could not read file');}
  };
  reader.readAsText(file);event.target.value='';
}

load().then(function(){ renderSection('countries'); });
</script>
