<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahmad's Travel Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060b14;--bg2:#0c1220;--bg3:#111a2e;--bg4:#182238;--bg5:#1f2c46;
  --sky:#3a9bd5;--sky2:#5fb8f0;--sand:#e8c97a;--sand2:#f5e4b0;
  --coral:#f07060;--mint:#4ecba0;--lavender:#9b7fe8;--rose:#e87aaa;
  --text:#eef2f8;--text2:#7a8aaa;--text3:#2e3a52;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse at 15% 20%,rgba(58,155,213,0.12) 0%,transparent 45%),radial-gradient(ellipse at 85% 80%,rgba(78,203,160,0.08) 0%,transparent 40%);}
.star-dots{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(1px 1px at 15% 12%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 32% 28%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 55% 8%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 72% 18%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 88% 32%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 10% 45%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 65% 55%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 42% 70%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 90% 65%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 25% 85%,rgba(255,255,255,0.3) 0%,transparent 100%);}
header,.sync-wrap,.stats-wrap,.tabs-wrap,.main,.modal-overlay,.lightbox{position:relative;z-index:1;}

/* HEADER */
header{text-align:center;padding:52px 20px 24px;}
.header-eyebrow{font-size:10px;letter-spacing:6px;text-transform:uppercase;color:var(--sky2);font-weight:500;margin-bottom:12px;}
h1{font-family:'Playfair Display',serif;font-size:clamp(40px,8vw,72px);font-weight:900;line-height:0.92;letter-spacing:-2px;}
h1 .l1{color:var(--sky2);display:block;}h1 .l2{color:var(--sand);display:block;font-style:italic;}
.header-sub{font-size:12px;color:var(--text2);margin-top:14px;letter-spacing:3px;text-transform:uppercase;}
.header-divider{width:200px;height:1px;margin:18px auto 0;background:linear-gradient(to right,transparent,var(--sky),var(--sand),transparent);}

/* SYNC BAR */
.sync-wrap{max-width:980px;margin:0 auto;padding:10px 16px 0;display:flex;justify-content:space-between;align-items:center;}
.sync-status{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);}
.sync-dot.ok{background:var(--mint);}
.sync-dot.err{background:var(--coral);}
.sync-dot.loading{background:var(--sand);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.backup-btns{display:flex;gap:6px;}
.backup-btn{background:var(--bg2);border:1px solid var(--bg4);color:var(--text2);font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .2s;}
.backup-btn:hover{border-color:var(--sky2);color:var(--sky2);}

/* STATS */
.stats-wrap{max-width:680px;margin:16px auto 0;padding:0 16px;}
.stats-bar{display:flex;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);overflow:hidden;}
.stat-item{flex:1;text-align:center;padding:12px 6px;border-right:1px solid var(--bg4);}
.stat-item:last-child{border-right:none;}
.stat-num{display:block;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--sky2);line-height:1;}
.stat-lbl{display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-top:3px;}

/* TABS */
.tabs-wrap{display:flex;justify-content:center;gap:6px;padding:16px 16px 0;flex-wrap:wrap;}
.tab-btn{background:var(--bg2);border:1px solid var(--bg4);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:8px 16px;border-radius:30px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.tab-btn:hover{color:var(--text);border-color:var(--bg5);}
.tab-btn.t-countries.active{background:rgba(58,155,213,.12);border-color:var(--sky);color:var(--sky2);}
.tab-btn.t-cities.active{background:rgba(232,201,122,.1);border-color:var(--sand);color:var(--sand2);}
.tab-btn.t-landmarks.active{background:rgba(78,203,160,.1);border-color:var(--mint);color:var(--mint);}
.tab-btn.t-beaches.active{background:rgba(240,112,96,.1);border-color:var(--coral);color:var(--coral);}
.tab-btn.t-hotels.active{background:rgba(155,127,232,.1);border-color:var(--lavender);color:var(--lavender);}
.tab-btn.t-food.active{background:rgba(232,122,170,.1);border-color:var(--rose);color:var(--rose);}

/* MAIN */
.main{max-width:980px;margin:0 auto;padding:16px 16px 80px;}
.section{display:none;}.section.active{display:block;}

/* FILTER ROW */
.filter-row{display:flex;gap:8px;margin-bottom:18px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
.filter-pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{padding:5px 12px;border-radius:20px;font-size:11px;letter-spacing:.5px;cursor:pointer;border:1px solid transparent;transition:all .18s;font-weight:400;}
.pill.all{background:var(--bg3);border-color:var(--bg5);color:var(--text2);}
.pill.visited,.pill.stayed,.pill.eaten{background:rgba(78,203,160,.08);border-color:rgba(78,203,160,.2);color:#4ecba0;}
.pill.want{background:rgba(58,155,213,.08);border-color:rgba(58,155,213,.2);color:#5fb8f0;}
.pill.bucket{background:rgba(232,201,122,.08);border-color:rgba(232,201,122,.2);color:#e8c97a;}
.pill.planning{background:rgba(155,127,232,.08);border-color:rgba(155,127,232,.2);color:#b09ee8;}
.pill.again,.pill.wouldreturn{background:rgba(240,112,96,.08);border-color:rgba(240,112,96,.2);color:#f07060;}
.pill.wouldnt{background:rgba(232,122,170,.08);border-color:rgba(232,122,170,.2);color:#e87aaa;}
.pill.active-filter,.pill:hover{filter:brightness(1.35);border-color:currentColor;}
.add-btn{background:var(--bg3);border:1px solid var(--bg5);color:var(--text);font-size:12px;font-weight:500;padding:8px 16px;border-radius:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.add-btn:hover{background:var(--bg4);}

/* GRID */
.entries-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

/* CARD */
.entry-card{background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--radius);overflow:hidden;transition:transform .2s,border-color .2s;position:relative;}
.entry-card:hover{transform:translateY(-3px);border-color:var(--bg5);}
.entry-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.entry-card.visited::before,.entry-card.stayed::before,.entry-card.eaten::before{background:linear-gradient(to right,transparent,#4ecba0,transparent);}
.entry-card.want::before{background:linear-gradient(to right,transparent,#5fb8f0,transparent);}
.entry-card.bucket::before{background:linear-gradient(to right,transparent,#e8c97a,transparent);}
.entry-card.planning::before{background:linear-gradient(to right,transparent,#b09ee8,transparent);}
.entry-card.again::before,.entry-card.wouldreturn::before{background:linear-gradient(to right,transparent,#f07060,transparent);}
.entry-card.wouldnt::before{background:linear-gradient(to right,transparent,#e87aaa,transparent);}

/* PHOTO STRIP */
.card-photos{display:flex;gap:4px;padding:4px;background:var(--bg3);overflow-x:auto;scrollbar-width:none;}
.card-photos:empty{display:none;}
.card-photos::-webkit-scrollbar{display:none;}
.thumb{width:70px;height:70px;object-fit:cover;border-radius:7px;cursor:pointer;flex-shrink:0;transition:transform .15s;}
.thumb:hover{transform:scale(1.05);}
.thumb-add{width:70px;height:70px;border-radius:7px;border:1.5px dashed var(--bg5);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--text3);font-size:18px;transition:all .2s;background:var(--bg2);gap:2px;}
.thumb-add:hover{border-color:var(--sky2);color:var(--sky2);}
.thumb-add span{font-size:9px;letter-spacing:1px;text-transform:uppercase;}
.thumb-input{display:none;}

.card-body{padding:16px;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
.card-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text);line-height:1.2;flex:1;}
.card-sub{font-size:11px;color:var(--text2);margin-bottom:8px;}
.card-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;}
.entry-card:hover .card-actions{opacity:1;}
.card-act-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--text3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.card-act-btn:hover{color:var(--text);border-color:var(--bg5);}
.card-act-btn.del:hover{color:var(--coral);border-color:rgba(240,112,96,.3);}

.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.status-badge{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.status-badge.visited,.status-badge.stayed,.status-badge.eaten{background:rgba(78,203,160,.12);color:#4ecba0;}
.status-badge.want{background:rgba(58,155,213,.12);color:#5fb8f0;}
.status-badge.bucket{background:rgba(232,201,122,.12);color:#e8c97a;}
.status-badge.planning{background:rgba(155,127,232,.12);color:#b09ee8;}
.status-badge.again,.status-badge.wouldreturn{background:rgba(240,112,96,.12);color:#f07060;}
.status-badge.wouldnt{background:rgba(232,122,170,.12);color:#e87aaa;}
.status-dot{width:4px;height:4px;border-radius:50%;background:currentColor;}
.budget-badge{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--bg4);padding:2px 8px;border-radius:6px;}

.card-rating{display:flex;gap:2px;margin-bottom:6px;}
.star{font-size:13px;color:var(--text3);cursor:pointer;transition:color .1s;}
.star.filled{color:var(--sand);}
.star:hover{color:var(--sand2);}

.card-section-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin:6px 0 3px;font-weight:500;}
.card-block{font-size:12px;color:var(--text2);line-height:1.6;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;padding:7px 10px;margin-bottom:5px;}
.card-thoughts{font-size:13px;color:var(--text2);line-height:1.6;font-style:italic;border-top:1px solid var(--bg4);padding-top:8px;margin-top:5px;}
.todo-list{list-style:none;}
.todo-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2);padding:3px 0;}
.todo-item::before{content:'';width:5px;height:5px;border:1px solid var(--sky2);border-radius:50%;flex-shrink:0;}

/* BUCKET LIST CARD — special styling */
.entry-card.bucket-card{border-color:rgba(232,201,122,.2);}
.bucket-highlights{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.bucket-tag{font-size:10px;background:rgba(232,201,122,.1);border:1px solid rgba(232,201,122,.2);color:var(--sand);padding:2px 9px;border-radius:20px;}

/* PLANNING CARD */
.plan-dates{font-size:12px;color:var(--lavender);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.plan-dates::before{content:'✈️';font-size:12px;}
.checklist-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);padding:3px 0;}
.checklist-row input[type=checkbox]{accent-color:var(--mint);width:13px;height:13px;flex-shrink:0;}

.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.35;}
.empty-state p{font-size:12px;letter-spacing:2px;text-transform:uppercase;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.96);align-items:center;justify-content:center;flex-direction:column;}
.lightbox.open{display:flex;}
.lightbox-img{max-width:94vw;max-height:76vh;object-fit:contain;border-radius:10px;}
.lightbox-nav{display:flex;align-items:center;gap:20px;margin-top:16px;}
.lb-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--text2);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lb-btn:hover{border-color:var(--sky2);color:var(--sky2);}
.lb-close{position:fixed;top:18px;right:18px;background:var(--bg3);border:1px solid var(--bg4);color:var(--text2);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;z-index:501;}
.lb-close:hover{border-color:var(--coral);color:var(--coral);}
.lb-counter{font-size:12px;color:var(--text2);letter-spacing:2px;}
.lb-del{background:rgba(240,112,96,.1);border:1px solid rgba(240,112,96,.25);color:var(--coral);width:42px;height:42px;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.lb-del:hover{background:rgba(240,112,96,.2);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--bg4);border-radius:16px;padding:24px 22px;width:100%;max-width:500px;max-height:93vh;overflow-y:auto;animation:mIn .25s cubic-bezier(.34,1.3,.64,1) forwards;}
@keyframes mIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:18px;}
.modal-title span{color:var(--sky2);font-style:italic;}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;font-weight:500;}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 13px;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--bg5);}
.form-select option{background:var(--bg3);}
.form-textarea{resize:vertical;min-height:64px;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sec-divider{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin:14px 0 10px;display:flex;align-items:center;gap:10px;font-weight:500;}
.sec-divider::after{content:'';flex:1;height:1px;background:var(--bg4);}

/* LIST INPUT — for highlights, restaurants etc */
.list-input-wrap{display:flex;gap:6px;}
.list-input-wrap .form-input{flex:1;}
.list-add-btn{background:var(--bg3);border:1px solid var(--bg4);color:var(--sky2);width:38px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.list-add-btn:hover{border-color:var(--sky);}
.list-items{margin-top:6px;display:flex;flex-direction:column;gap:2px;}
.list-item-row{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--text2);padding:4px 8px;background:var(--bg3);border-radius:6px;}
.list-item-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;transition:color .15s;padding:0 2px;}
.list-item-remove:hover{color:var(--coral);}

/* PHOTO UPLOAD */
.photo-upload-area{border:1.5px dashed var(--bg5);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.photo-upload-area:hover{border-color:var(--sky2);}
.photo-upload-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.pua-icon{font-size:24px;margin-bottom:4px;}
.pua-text{font-size:12px;color:var(--text2);}
.modal-photo-previews{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.modal-thumb-wrap{position:relative;width:60px;height:60px;}
.modal-thumb{width:60px;height:60px;object-fit:cover;border-radius:8px;}
.modal-thumb-del{position:absolute;top:-5px;right:-5px;background:var(--coral);border:none;color:#fff;width:16px;height:16px;border-radius:50%;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.rating-input{display:flex;gap:5px;}
.rating-star{font-size:20px;color:var(--text3);cursor:pointer;transition:color .1s;user-select:none;}
.rating-star.filled{color:var(--sand);}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-primary{flex:1;background:var(--sky);border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:11px;border-radius:8px;cursor:pointer;transition:all .2s;letter-spacing:.5px;}
.btn-primary:hover{background:var(--sky2);}
.btn-secondary{background:var(--bg3);border:1px solid var(--bg4);color:var(--text2);font-size:13px;padding:11px 16px;border-radius:8px;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:var(--bg5);color:var(--text);}

::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
</style>
</head>
<body>
<div class="stars"></div><div class="star-dots"></div>

<header>
  <p class="header-eyebrow">Ahmad's Travel Journal</p>
  <h1><span class="l1">Wander</span><span class="l2">& Explore</span></h1>
  <p class="header-sub">Countries · Cities · Landmarks · Beaches · Hotels · Food</p>
  <div class="header-divider"></div>
</header>

<div class="sync-wrap">
  <div class="sync-status"><div class="sync-dot loading" id="sync-dot"></div><span id="sync-label">Connecting...</span></div>
  <div class="backup-btns">
    <button class="backup-btn" onclick="exportData()">⬇ Export</button>
    <button class="backup-btn" onclick="document.getElementById('import-input').click()">⬆ Import</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)"/>
  </div>
</div>

<div class="stats-wrap">
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item"><span class="stat-num" id="st-total">0</span><span class="stat-lbl">Total</span></div>
    <div class="stat-item"><span class="stat-num" id="st-s1">0</span><span class="stat-lbl" id="lbl-s1">Visited</span></div>
    <div class="stat-item"><span class="stat-num" id="st-s2">0</span><span class="stat-lbl" id="lbl-s2">Want to Go</span></div>
    <div class="stat-item"><span class="stat-num" id="st-s3">0</span><span class="stat-lbl" id="lbl-s3">Bucket List</span></div>
    <div class="stat-item"><span class="stat-num" id="st-s4">0</span><span class="stat-lbl" id="lbl-s4">Planning</span></div>
  </div>
</div>

<div class="tabs-wrap">
  <button class="tab-btn t-countries active" onclick="switchTab('countries',this)"><span>🌍</span> Countries</button>
  <button class="tab-btn t-cities"           onclick="switchTab('cities',this)"><span>🏙️</span> Cities</button>
  <button class="tab-btn t-landmarks"        onclick="switchTab('landmarks',this)"><span>🗺️</span> Landmarks</button>
  <button class="tab-btn t-beaches"          onclick="switchTab('beaches',this)"><span>🏖️</span> Beaches</button>
  <button class="tab-btn t-hotels"           onclick="switchTab('hotels',this)"><span>🏨</span> Hotels</button>
  <button class="tab-btn t-food"             onclick="switchTab('food',this)"><span>🍜</span> Food Spots</button>
</div>

<div class="main">
  <div id="sec-countries" class="section active"></div>
  <div id="sec-cities"    class="section"></div>
  <div id="sec-landmarks" class="section"></div>
  <div id="sec-beaches"   class="section"></div>
  <div id="sec-hotels"    class="section"></div>
  <div id="sec-food"      class="section"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img class="lightbox-img" id="lb-img" src="" alt=""/>
  <div class="lightbox-nav">

<script>
var SB_URL='https://oludgjpyrennjfkizmas.supabase.co';
var SB_KEY='sb_publishable_iPOfDAFeSbuFD95Ibnr05w_U9fQHHvJ';
function sbFetch(path,opts){
  return fetch(SB_URL+path,Object.assign({headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'}},opts));
}
function setSyncStatus(s,m){
  var d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');
  if(d)d.className='sync-dot '+s; if(l)l.textContent=m;
}

// Per-section statuses
var STATUSES={
  countries:[{k:'visited',l:'Visited'},{k:'want',l:'Want to Visit'},{k:'bucket',l:'Bucket List'},{k:'planning',l:'Planning'},{k:'again',l:'To Go Again'}],
  cities:   [{k:'visited',l:'Visited'},{k:'want',l:'Want to Visit'},{k:'bucket',l:'Bucket List'},{k:'planning',l:'Planning'},{k:'again',l:'To Go Again'}],
  landmarks:[{k:'visited',l:'Visited'},{k:'want',l:'Want to Visit'},{k:'bucket',l:'Bucket List'}],
  beaches:  [{k:'visited',l:'Visited'},{k:'want',l:'Want to Visit'},{k:'bucket',l:'Bucket List'},{k:'again',l:'To Go Again'}],
  hotels:   [{k:'stayed',l:'Stayed'},{k:'want',l:'Want to Stay'},{k:'wouldreturn',l:'Would Return'},{k:'wouldnt',l:"Wouldn't Return"}],
  food:     [{k:'eaten',l:'Eaten Here'},{k:'want',l:'Want to Try'},{k:'again',l:'Regular'},{k:'wouldnt',l:"Wouldn't Return"}]
};

var STAT_CONFIG={
  countries:{s1:['visited','again'],s2:['want'],s3:['bucket'],s4:['planning'],l1:'Visited',l2:'Want to Go',l3:'Bucket List',l4:'Planning'},
  cities:   {s1:['visited','again'],s2:['want'],s3:['bucket'],s4:['planning'],l1:'Visited',l2:'Want to Go',l3:'Bucket List',l4:'Planning'},
  landmarks:{s1:['visited'],s2:['want'],s3:['bucket'],s4:[],l1:'Visited',l2:'Want to See',l3:'Bucket List',l4:''},
  beaches:  {s1:['visited','again'],s2:['want'],s3:['bucket'],s4:[],l1:'Visited',l2:'Want to Go',l3:'Bucket List',l4:''},
  hotels:   {s1:['stayed'],s2:['want'],s3:['wouldreturn'],s4:['wouldnt'],l1:'Stayed',l2:'Want to Stay',l3:'Would Return',l4:"Won't Return"},
  food:     {s1:['eaten','again'],s2:['want'],s3:[],s4:['wouldnt'],l1:'Visited',l2:'Want to Try',l3:'',l4:"Won't Return"}
};

var TAB_LABELS={countries:'Country',cities:'City',landmarks:'Landmark',beaches:'Beach / Nature',hotels:'Hotel / Stay',food:'Food Spot'};
var TAB_ICONS={countries:'🌍',cities:'🏙️',landmarks:'🗺️',beaches:'🏖️',hotels:'🏨',food:'🍜'};

var data={countries:[],cities:[],landmarks:[],beaches:[],hotels:[],food:[]};
var currentTab='countries';
var currentFilter={countries:'all',cities:'all',landmarks:'all',beaches:'all',hotels:'all',food:'all'};
var editRating=0; var editingId=null; var modalPhotos=[];
var listFields={}; // dynamic list fields in modal
var lbPhotos=[]; var lbIndex=0; var lbCat=''; var lbEntryId='';

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function saveLocal(){try{localStorage.setItem('ahmads-travel2',JSON.stringify(data));}catch(e){}}

async function loadAll(){
  setSyncStatus('loading','Connecting...');
  try{
    var res=await sbFetch('/rest/v1/travel?select=*&order=created_at.desc');
    if(!res.ok)throw new Error();
    var rows=await res.json();
    data={countries:[],cities:[],landmarks:[],beaches:[],hotels:[],food:[]};
    rows.forEach(function(r){
      if(data[r.cat]!==undefined){
        var entry={id:r.id,cat:r.cat,title:r.title,status:r.status,budget:r.budget||'',
          date:r.date_visited||'',who:r.who_with||'',rating:r.rating||0,
          thoughts:r.thoughts||'',memories:r.memories||'',tips:r.tips||'',
          todos:safeJsonParse(r.todos,[]),photos:safeJsonParse(r.photos,[]),
          extra:safeJsonParse(r.extra,{})};
        data[r.cat].push(entry);
      }
    });
    saveLocal();setSyncStatus('ok','Synced');
    renderSection(currentTab);
  }catch(e){
    setSyncStatus('err','Offline — local data');
    try{var s=localStorage.getItem('ahmads-travel2');if(s){data=JSON.parse(s);renderSection(currentTab);}}catch(ex){}
  }
}

function safeJsonParse(s,def){try{return s?JSON.parse(s):def;}catch(e){return def;}}

function switchTab(cat,btn){
  currentTab=cat;
  currentFilter={countries:'all',cities:'all',landmarks:'all',beaches:'all',hotels:'all',food:'all'};
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');s.innerHTML='';});
  document.getElementById('sec-'+cat).classList.add('active');
  renderSection(cat);
}

function setFilter(cat,status,el){
  currentFilter[cat]=status;
  el.closest('.filter-pills').querySelectorAll('.pill').forEach(function(p){p.classList.remove('active-filter');});
  el.classList.add('active-filter');
  renderSection(cat);
}

function renderSection(cat){
  var sec=document.getElementById('sec-'+cat);
  var filter=currentFilter[cat];
  var entries=data[cat]||[];
  var filtered=filter==='all'?entries:entries.filter(function(e){return e.status===filter;});
  var html='<div class="filter-row"><div class="filter-pills">';
  html+=makePill('all','All',cat,filter);
  STATUSES[cat].forEach(function(s){html+=makePill(s.k,s.l,cat,filter);});
  html+='</div><button class="add-btn" onclick="openModal(\''+cat+'\',null)">+ Add</button></div>';
  html+='<div class="entries-grid">';
  if(!filtered.length){
    html+='<div class="empty-state"><div class="empty-icon">'+TAB_ICONS[cat]+'</div><p>Nothing here yet</p></div>';
  }else{
    filtered.forEach(function(e){html+=renderCard(e,cat);});
  }
  html+='</div>';
  sec.innerHTML=html;
  updateStats(cat);
}

function makePill(k,l,cat,active){
  var cls='pill '+(k==='all'?'all':k)+(active===k?' active-filter':'');
  return '<span class="'+cls+'" onclick="setFilter(\''+cat+'\',\''+k+'\',this)">'+l+'</span>';
}

function updateStats(cat){
  var entries=data[cat]||[];
  var cfg=STAT_CONFIG[cat];
  document.getElementById('st-total').textContent=entries.length;
  document.getElementById('st-s1').textContent=entries.filter(function(e){return cfg.s1.indexOf(e.status)>-1;}).length;
  document.getElementById('st-s2').textContent=entries.filter(function(e){return cfg.s2.indexOf(e.status)>-1;}).length;
  document.getElementById('st-s3').textContent=entries.filter(function(e){return cfg.s3.indexOf(e.status)>-1;}).length;
  document.getElementById('st-s4').textContent=entries.filter(function(e){return cfg.s4.indexOf(e.status)>-1;}).length;
  document.getElementById('lbl-s1').textContent=cfg.l1;
  document.getElementById('lbl-s2').textContent=cfg.l2;
  document.getElementById('lbl-s3').textContent=cfg.l3;
  document.getElementById('lbl-s4').textContent=cfg.l4;
  // hide empty stat cols
  ['s1','s2','s3','s4'].forEach(function(k){
    var item=document.getElementById('st-'+k).parentElement;
    item.style.display=cfg['l'+k.slice(1)]?'':'none';
  });
}

function renderCard(e,cat){
  var isBucket=e.status==='bucket';
  var isPlanning=e.status==='planning';
  var extra=e.extra||{};
  var statusLabel=STATUSES[cat].find(function(s){return s.k===e.status;});
  var label=statusLabel?statusLabel.l:e.status;

  // photo strip
  var photos=e.photos||[];
  var photoStrip='<div class="card-photos">';
  photos.forEach(function(p,idx){
    photoStrip+='<img class="thumb" src="'+p+'" loading="lazy" onclick="openLightbox(\''+cat+'\',\''+e.id+'\','+idx+')" alt="Photo"/>';
  });
  if(cat==='landmarks'||cat==='beaches'||cat==='countries'||cat==='cities'){
    photoStrip+='<div class="thumb-add" onclick="triggerCardPhotoAdd(\''+cat+'\',\''+e.id+'\')"><span>📷</span><span>Add</span></div>';
    photoStrip+='<input type="file" class="thumb-input" id="cpi-'+e.id+'" accept="image/*" multiple onchange="handleCardPhotoAdd(event,\''+cat+'\',\''+e.id+'\')">';
  }
  photoStrip+='</div>';

  var html='<div class="entry-card '+e.status+(isBucket?' bucket-card':'')+'">';
  if(photos.length||cat==='landmarks'||cat==='beaches'||cat==='countries'||cat==='cities') html+=photoStrip;

  html+='<div class="card-body">';
  html+='<div class="card-top"><div>';
  html+='<div class="card-title">'+esc(e.title)+'</div>';
  if(e.date||e.who) html+='<div class="card-sub">'+(e.date?esc(e.date):'')+(e.date&&e.who?' · ':'')+esc(e.who||'')+'</div>';
  if(cat==='landmarks'&&extra.country) html+='<div class="card-sub">📍 '+esc(extra.country)+'</div>';
  if(cat==='cities'&&extra.country) html+='<div class="card-sub">📍 '+esc(extra.country)+'</div>';
  if(cat==='hotels'&&extra.area) html+='<div class="card-sub">📍 '+esc(extra.area)+'</div>';
  if(cat==='food'&&extra.location) html+='<div class="card-sub">📍 '+esc(extra.location)+'</div>';
  html+='</div>';
  html+='<div class="card-actions"><button class="card-act-btn" onclick="openModal(\''+cat+'\',\''+e.id+'\')">✎</button><button class="card-act-btn del" onclick="deleteEntry(\''+cat+'\',\''+e.id+'\')">✕</button></div></div>';

  html+='<div class="card-meta"><span class="status-badge '+e.status+'"><span class="status-dot"></span>'+label+'</span>';
  if(e.budget) html+='<span class="budget-badge">'+esc(e.budget)+'</span>';
  if(extra.priority) html+='<span class="budget-badge" style="color:var(--sand)">'+esc(extra.priority)+'</span>';
  html+='</div>';

  if(!isBucket&&!isPlanning){
    var stars=''; for(var i=1;i<=5;i++) stars+='<span class="star'+(i<=e.rating?' filled':'')+'" onclick="quickRate(\''+cat+'\',\''+e.id+'\','+i+')">★</span>';
    html+='<div class="card-rating">'+stars+'</div>';
  }

  // Bucket List specific display
  if(isBucket){
    if(extra.bestTime) html+='<div class="card-section-lbl">Best Time to Visit</div><div class="card-block">'+esc(extra.bestTime)+'</div>';
    if(extra.highlights&&extra.highlights.length){
      html+='<div class="card-section-lbl">Highlights</div><div class="bucket-highlights">';
      extra.highlights.forEach(function(h){html+='<span class="bucket-tag">'+esc(h)+'</span>';});
      html+='</div>';
    }
    if(extra.accommodation) html+='<div class="card-section-lbl">Accommodation Areas</div><div class="card-block">'+esc(extra.accommodation)+'</div>';
    if(extra.restaurants&&extra.restaurants.length){
      html+='<div class="card-section-lbl">Restaurants to Try</div><div class="bucket-highlights">';
      extra.restaurants.forEach(function(r){html+='<span class="bucket-tag" style="color:var(--rose);background:rgba(232,122,170,.1);border-color:rgba(232,122,170,.2);">'+esc(r)+'</span>';});
      html+='</div>';
    }
    if(e.thoughts) html+='<div class="card-section-lbl">Why I Want to Go</div><div class="card-block" style="font-style:italic;">'+esc(e.thoughts)+'</div>';
  }

  // Planning specific display
  if(isPlanning){
    if(extra.depDate) html+='<div class="plan-dates">'+esc(extra.depDate)+(extra.retDate?' → '+esc(extra.retDate):'')+'</div>';
    if(extra.highlights&&extra.highlights.length){
      html+='<div class="card-section-lbl">Itinerary Notes</div>';
      extra.highlights.forEach(function(d){html+='<div class="card-block" style="margin-bottom:4px;">'+esc(d)+'</div>';});
    }
    var checks=[{k:'flightsBooked',l:'Flights Booked'},{k:'hotelBooked',l:'Hotel Booked'},{k:'visaDone',l:'Visa / Docs Ready'},{k:'insuranceDone',l:'Travel Insurance'}];
    var anyCheck=checks.some(function(c){return extra[c.k];});
    if(anyCheck){
      html+='<div class="card-section-lbl">Checklist</div>';
      checks.forEach(function(c){
        if(extra[c.k]!==undefined) html+='<div class="checklist-row"><input type="checkbox" '+(extra[c.k]?'checked':'')+' onclick="toggleCheck(\''+cat+'\',\''+e.id+'\',\''+c.k+'\',this)"/> '+c.l+'</div>';
      });
    }
    if(e.thoughts) html+='<div class="card-thoughts">'+esc(e.thoughts)+'</div>';
  }

  // Standard display for non-bucket, non-planning
  if(!isBucket&&!isPlanning){
    if(e.thoughts) html+='<div class="card-thoughts">'+esc(e.thoughts)+'</div>';
    if(e.memories){html+='<div class="card-section-lbl">Memory</div><div class="card-block">'+esc(e.memories)+'</div>';}
    if(e.tips){html+='<div class="card-section-lbl">Tips</div><div class="card-block">'+esc(e.tips)+'</div>';}
    if(e.todos&&e.todos.length){
      html+='<div class="card-section-lbl">Still To Do</div><ul class="todo-list">';
      e.todos.forEach(function(t){html+='<li class="todo-item">'+esc(t)+'</li>';});
      html+='</ul>';
    }
  }

  html+='</div></div>';
  return html;
}

// ----------- MODAL -----------
function openModal(cat,id){
  editingId=id; modalPhotos=[]; listFields={};
  var e=id?data[cat].find(function(x){return x.id===id;}):null;
  var status=e?e.status:STATUSES[cat][0].k;
  var extra=e?(e.extra||{}):{};
  listFields={highlights:extra.highlights||[],restaurants:extra.restaurants||[],todos:e?e.todos||[]:[]};

  var html='<p class="modal-title">'+( id?'Edit ':'Add ')+'<span>'+TAB_LABELS[cat]+'</span></p>';
  html+='<input type="hidden" id="ec"/><input type="hidden" id="eid"/>';

  html+='<div class="form-group"><label class="form-label">Name</label><input class="form-input" id="f-title" type="text" placeholder="'+TAB_LABELS[cat]+' name..." value="'+esc(e?e.title:'')+'"/></div>';

  html+='<div class="form-row">';
  html+='<div class="form-group"><label class="form-label">Status</label><select class="form-select" id="f-status" onchange="onStatusChange(\''+cat+'\')">';
  STATUSES[cat].forEach(function(s){html+='<option value="'+s.k+'"'+(s.k===status?' selected':'')+'>'+s.l+'</option>';});
  html+='</select></div>';

  // budget only for countries/cities/beaches
  if(['countries','cities','beaches'].indexOf(cat)>-1){
    html+='<div class="form-group"><label class="form-label">Budget</label><select class="form-select" id="f-budget"><option value="">—</option><option value="Budget"'+(extra.budget==='Budget'?' selected':'')+'>Budget</option><option value="Mid-range"'+(extra.budget==='Mid-range'?' selected':'')+'>Mid-range</option><option value="Pricey"'+(extra.budget==='Pricey'?' selected':'')+'>Pricey</option><option value="Luxury"'+(extra.budget==='Luxury'?' selected':'')+'>Luxury</option></select></div>';
  }
  html+='</div>';

  // country/city field for landmarks and cities
  if(cat==='landmarks'){
    html+='<div class="form-group"><label class="form-label">Country / City</label><input class="form-input" id="f-country" type="text" placeholder="e.g. Paris, France" value="'+esc(extra.country||'')+'"/></div>';
  }
  if(cat==='cities'){
    html+='<div class="form-group"><label class="form-label">Country</label><input class="form-input" id="f-country" type="text" placeholder="e.g. Japan" value="'+esc(extra.country||'')+'"/></div>';
  }
  if(cat==='hotels'){
    html+='<div class="form-group"><label class="form-label">Area / Location</label><input class="form-input" id="f-area" type="text" placeholder="e.g. Shibuya, Tokyo" value="'+esc(extra.area||'')+'"/></div>';
  }
  if(cat==='food'){
    html+='<div class="form-group"><label class="form-label">Location</label><input class="form-input" id="f-foodloc" type="text" placeholder="e.g. Osaka, Japan" value="'+esc(extra.location||'')+'"/></div>';
    html+='<div class="form-group"><label class="form-label">What I Ordered</label><input class="form-input" id="f-ordered" type="text" placeholder="e.g. Ramen, sushi..." value="'+esc(extra.ordered||'')+'"/></div>';
  }

  // dynamic sections based on status
  html+='<div id="status-fields">';
  html+=buildStatusFields(cat,status,e,extra);
  html+='</div>';

  // photos for landmarks
  if(cat==='landmarks'||cat==='beaches'||cat==='countries'||cat==='cities'){
    if(e) modalPhotos=(e.photos||[]).slice();
    html+='<div class="sec-divider">Photos</div>';
    html+='<div class="form-group"><div class="photo-upload-area" onclick="document.getElementById(\'photo-file-input\').click()"><input type="file" id="photo-file-input" accept="image/*" multiple onchange="handlePhotoUpload(event)"/><div class="pua-icon">📷</div><div class="pua-text">Tap to add photos</div></div>';
    html+='<div class="modal-photo-previews" id="modal-photo-previews"></div></div>';
  }

  html+='<div class="modal-actions"><button class="btn-secondary" onclick="closeModal()">Cancel</button><button class="btn-primary" onclick="saveEntry(\''+cat+'\')">Save</button></div>';

  var mb=document.getElementById('modal-body');
  mb.innerHTML=html;
  document.getElementById('ec').value=cat;
  document.getElementById('eid').value=id||'';

  // set hidden rating
  mb.dataset.rating=editRating=(e?e.rating||0:0);
  // attach rating stars events
  mb.querySelectorAll('.rating-star').forEach(function(star){
    star.addEventListener('click',function(){
      editRating=parseInt(this.getAttribute('data-v'));
      mb.dataset.rating=editRating;
      updateRatingStars(editRating);
    });
    star.addEventListener('mouseover',function(){updateRatingStars(parseInt(this.getAttribute('data-v')));});
  });
  var ri=mb.querySelector('#rating-input');
  if(ri) ri.addEventListener('mouseleave',function(){updateRatingStars(editRating);});
  updateRatingStars(editRating);
  if(e) modalPhotos=(e.photos||[]).slice();
  renderModalPreviews();

  // render list fields
  renderListField('highlights');
  renderListField('restaurants');
  renderListField('todos');

  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(function(){var t=document.getElementById('f-title');if(t)t.focus();},100);
}

    html+='<div class="form-group"><label class="form-label">Why I Want to Go</label><textarea class="form-textarea" id="f-thoughts" placeholder="What draws you to this place?">'+esc(e?e.thoughts||'':'')+'</textarea></div>';
    html+='<div class="form-group"><label class="form-label">Best Time to Visit</label><input class="form-input" id="f-besttime" type="text" placeholder="e.g. March–May, avoid rainy season" value="'+esc(extra.bestTime||'')+'"/></div>';
    html+='<div class="form-group"><label class="form-label">Priority</label><select class="form-select" id="f-priority"><option value="">—</option><option value="Dream 🌟"'+(extra.priority==='Dream 🌟'?' selected':'')+'>Dream 🌟</option><option value="High ⭐"'+(extra.priority==='High ⭐'?' selected':'')+'>High ⭐</option><option value="Someday 💭"'+(extra.priority==='Someday 💭'?' selected':'')+'>Someday 💭</option></select></div>';

    html+='<div class="list-input-wrap"><input class="form-input" id="li-restaurants" type="text" placeholder="e.g. Ichiran Ramen..."/><button class="list-add-btn" onclick="addListItem(\'restaurants\')">+</button></div>';

  } else if(isPlanning){
    html+='<div class="sec-divider">Trip Details</div>';
    html+='<div class="form-row"><div class="form-group"><label class="form-label">Departure Date</label><input class="form-input" id="f-depdate" type="text" placeholder="e.g. 12 June 2026" value="'+esc(extra.depDate||'')+'"/></div>';
    html+='<div class="form-group"><label class="form-label">Return Date</label><input class="form-input" id="f-retdate" type="text" placeholder="e.g. 22 June 2026" value="'+esc(extra.retDate||'')+'"/></div></div>';
    html+='<div class="form-group"><label class="form-label">Who\'s Going</label><input class="form-input" id="f-who" type="text" placeholder="e.g. Fahimah, solo..." value="'+esc(e?e.who||'':'')+'"/></div>';
    html+='<div class="form-group"><label class="form-label">Budget Allocated</label><input class="form-input" id="f-tripbudget" type="text" placeholder="e.g. $3,000" value="'+esc(extra.tripBudget||'')+'"/></div>';
    html+='<div class="sec-divider">Itinerary</div>';
    html+='<div class="form-group"><label class="form-label">Add day/activity notes</label>';
    html+='<div class="list-input-wrap"><input class="form-input" id="li-highlights" type="text" placeholder="e.g. Day 1 — Arrive Tokyo, check in..."/><button class="list-add-btn" onclick="addListItem(\'highlights\')">+</button></div>';
    html+='<div class="list-items" id="list-highlights"></div></div>';
    html+='<div class="sec-divider">Bookings Checklist</div>';
    var checks=[{k:'flightsBooked',l:'Flights Booked'},{k:'hotelBooked',l:'Hotel Booked'},{k:'visaDone',l:'Visa / Documents Ready'},{k:'insuranceDone',l:'Travel Insurance'}];
    checks.forEach(function(c){
      html+='<div class="checklist-row" style="margin-bottom:8px;"><input type="checkbox" id="chk-'+c.k+'" '+(extra[c.k]?'checked':'')+' style="accent-color:var(--mint);width:15px;height:15px;"/> <label for="chk-'+c.k+'" style="font-size:13px;color:var(--text2);cursor:pointer;">'+c.l+'</label></div>';
    });
    html+='<div class="sec-divider">Notes</div>';
    html+='<div class="form-group"><label class="form-label">Notes / Thoughts</label><textarea class="form-textarea" id="f-thoughts" placeholder="Anything else to note...">'+esc(e?e.thoughts||'':'')+'</textarea></div>';
    html+='<div class="form-group"><label class="form-label">Emergency Info</label><input class="form-input" id="f-emergency" type="text" placeholder="Embassy, insurance number..." value="'+esc(extra.emergency||'')+'"/></div>';
    html+='<div class="sec-divider">Packing / To Do</div>';
    html+='<div class="form-group"><div class="list-input-wrap"><input class="form-input" id="li-todos" type="text" placeholder="e.g. Pack adaptor..."/><button class="list-add-btn" onclick="addListItem(\'todos\')">+</button></div>';
    html+='<div class="list-items" id="list-todos"></div></div>';
  } else {
    // standard visited / want etc
    html+='<div class="form-row">';
    if(['countries','cities','beaches'].indexOf(cat)>-1){
      html+='<div class="form-group"><label class="form-label">Date / Year</label><input class="form-input" id="f-date" type="text" placeholder="e.g. March 2024" value="'+esc(e?e.date||'':'')+'"/></div>';
      html+='<div class="form-group"><label class="form-label">Who I Went With</label><input class="form-input" id="f-who" type="text" placeholder="e.g. Fahimah..." value="'+esc(e?e.who||'':'')+'"/></div>';
    }
    html+='</div>';
    html+='<div class="form-group"><label class="form-label">Rating</label><div class="rating-input" id="rating-input">';
    for(var i=1;i<=5;i++) html+='<span class="rating-star'+(i<=(e?e.rating||0:0)?' filled':'')+'" data-v="'+i+'">★</span>';
    html+='</div></div>';
    html+='<div class="form-group"><label class="form-label">Thoughts / Review</label><textarea class="form-textarea" id="f-thoughts" placeholder="How was it?">'+esc(e?e.thoughts||'':'')+'</textarea></div>';
    if(['countries','cities','beaches','landmarks'].indexOf(cat)>-1){
      html+='<div class="form-group"><label class="form-label">Memory</label><textarea class="form-textarea" id="f-memories" placeholder="A moment to remember...">'+esc(e?e.memories||'':'')+'</textarea></div>';
      html+='<div class="form-group"><label class="form-label">Tips</label><textarea class="form-textarea" id="f-tips" placeholder="Best advice for visiting...">'+esc(e?e.tips||'':'')+'</textarea></div>';
    }
    html+='<div class="sec-divider">Still To Do</div>';
    html+='<div class="form-group"><div class="list-input-wrap"><input class="form-input" id="li-todos" type="text" placeholder="e.g. Visit the old town..."/><button class="list-add-btn" onclick="addListItem(\'todos\')">+</button></div>';
    html+='<div class="list-items" id="list-todos"></div></div>';
  }
  return html;
}

function onStatusChange(cat){
  var sel=document.getElementById('f-status');
  if(!sel)return;
  var status=sel.value;
  var e=editingId?data[cat].find(function(x){return x.id===editingId;}):null;
  var extra=e?(e.extra||{}):{};
  var sf=document.getElementById('status-fields');
  if(sf){ listFields={highlights:[],restaurants:[],todos:[]};sf.innerHTML=buildStatusFields(cat,status,e,extra);
    renderListField('highlights');renderListField('restaurants');renderListField('todos');
    var mb=document.getElementById('modal-body');
    mb.querySelectorAll('.rating-star').forEach(function(star){
      star.addEventListener('click',function(){editRating=parseInt(this.getAttribute('data-v'));mb.dataset.rating=editRating;updateRatingStars(editRating);});
      star.addEventListener('mouseover',function(){updateRatingStars(parseInt(this.getAttribute('data-v')));});
    });
    var ri=mb.querySelector('#rating-input');
    if(ri)ri.addEventListener('mouseleave',function(){updateRatingStars(editRating);});
    updateRatingStars(editRating);
  }
}

function addListItem(field){
  var inp=document.getElementById('li-'+field);
  if(!inp)return;
  var val=inp.value.trim();
  if(!val)return;
  if(!listFields[field])listFields[field]=[];
  listFields[field].push(val);
  inp.value='';
  renderListField(field);
}

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id&&document.activeElement.id.startsWith('li-')){
    e.preventDefault();
    addListItem(document.activeElement.id.slice(3));
  }
});

function removeListItem(field,idx){
  if(listFields[field])listFields[field].splice(idx,1);
  renderListField(field);
}

function renderListField(field){
  var wrap=document.getElementById('list-'+field);
  if(!wrap)return;
  var items=listFields[field]||[];
  wrap.innerHTML='';
  items.forEach(function(item,i){
    var row=document.createElement('div'); row.className='list-item-row';
    row.innerHTML=esc(item)+'<button class="list-item-remove" onclick="removeListItem(\''+field+'\','+i+')">✕</button>';
    wrap.appendChild(row);
  });
}

function updateRatingStars(val){
  var stars=document.querySelectorAll('#modal-body .rating-star');
  stars.forEach(function(s){s.classList.toggle('filled',parseInt(s.getAttribute('data-v'))<=val);});
}

function getVal(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function getChecked(id){var el=document.getElementById(id);return el?el.checked:false;}

async function saveEntry(cat){
  var title=getVal('f-title');
  if(!title){var t=document.getElementById('f-title');if(t)t.focus();return;}
  var status=getVal('f-status');
  var isBucket=status==='bucket';
  var isPlanning=status==='planning';

  var extra={};
  // bucket fields
  if(isBucket){
    extra.bestTime=getVal('f-besttime');extra.priority=getVal('f-priority');
    extra.accommodation=getVal('f-accommodation');extra.estBudget=getVal('f-estbudget');
    extra.inspiredBy=getVal('f-inspiredby');
    extra.highlights=(listFields.highlights||[]).slice();
    extra.restaurants=(listFields.restaurants||[]).slice();
  }
  // planning fields
  if(isPlanning){
    extra.depDate=getVal('f-depdate');extra.retDate=getVal('f-retdate');
    extra.tripBudget=getVal('f-tripbudget');extra.emergency=getVal('f-emergency');
    extra.highlights=(listFields.highlights||[]).slice();
    extra.flightsBooked=getChecked('chk-flightsBooked');
    extra.hotelBooked=getChecked('chk-hotelBooked');
    extra.visaDone=getChecked('chk-visaDone');
    extra.insuranceDone=getChecked('chk-insuranceDone');
  }
  // section-specific extras
  if(cat==='landmarks'){extra.country=getVal('f-country');}
  if(cat==='cities'){extra.country=getVal('f-country');}
  if(cat==='hotels'){extra.area=getVal('f-area');}
  if(cat==='food'){extra.location=getVal('f-foodloc');extra.ordered=getVal('f-ordered');}

  var entry={
    id:editingId||uid(), cat:cat, title:title, status:status,
    budget:getVal('f-budget')||'',
    date:getVal('f-date')||'', who:getVal('f-who')||'',
    rating:editRating,
    thoughts:getVal('f-thoughts')||'',
    memories:getVal('f-memories')||'',
    tips:getVal('f-tips')||'',
    todos:(listFields.todos||[]).slice(),
    photos:modalPhotos.slice(),
    extra:extra
  };

  var sbRow={id:entry.id,cat:cat,title:entry.title,status:entry.status,budget:entry.budget,
    date_visited:entry.date,who_with:entry.who,rating:entry.rating,
    thoughts:entry.thoughts,memories:entry.memories,tips:entry.tips,
    todos:JSON.stringify(entry.todos),photos:JSON.stringify(entry.photos),
    extra:JSON.stringify(entry.extra)};

  setSyncStatus('loading','Saving...');
  try{
    if(editingId){
      await sbFetch('/rest/v1/travel?id=eq.'+editingId,{method:'PATCH',body:JSON.stringify(sbRow)});
      var idx=data[cat].findIndex(function(e){return e.id===editingId;});
      if(idx>-1)data[cat][idx]=entry;
    }else{
      await sbFetch('/rest/v1/travel',{method:'POST',body:JSON.stringify(sbRow)});
      data[cat].unshift(entry);
    }
    setSyncStatus('ok','Saved ✓');
  }catch(e){
    setSyncStatus('err','Saved locally only');
    if(editingId){var idx=data[cat].findIndex(function(x){return x.id===editingId;});if(idx>-1)data[cat][idx]=entry;}
    else data[cat].unshift(entry);
  }
  saveLocal();closeModal();renderSection(cat);
}

async function toggleCheck(cat,id,key,el){
  var entry=data[cat].find(function(e){return e.id===id;});
  if(!entry)return;
  if(!entry.extra)entry.extra={};
  entry.extra[key]=el.checked;
  saveLocal();
  try{await sbFetch('/rest/v1/travel?id=eq.'+id,{method:'PATCH',body:JSON.stringify({extra:JSON.stringify(entry.extra)})});}catch(e){}
}

async function deleteEntry(cat,id){
  data[cat]=data[cat].filter(function(e){return e.id!==id;});
  saveLocal();renderSection(cat);
  try{await sbFetch('/rest/v1/travel?id=eq.'+id,{method:'DELETE'});}catch(e){}
}

async function quickRate(cat,id,r){
  var e=data[cat].find(function(x){return x.id===id;});
  if(!e)return; e.rating=r; saveLocal(); renderSection(cat);
  try{await sbFetch('/rest/v1/travel?id=eq.'+id,{method:'PATCH',body:JSON.stringify({rating:r})});}catch(ex){}
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editingId=null;modalPhotos=[];listFields={};}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// PHOTOS
async function uploadPhotoToStorage(file,entryId){
  var ext=file.name.split('.').pop()||'jpg';
  var path='travel/'+entryId+'/'+uid()+'.'+ext;
  var res=await fetch(SB_URL+'/storage/v1/object/Photos/'+path,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type},body:file});
  if(!res.ok)throw new Error('Upload failed');
  return SB_URL+'/storage/v1/object/public/Photos/'+path;
}
async function deletePhotoFromStorage(url){
  var path=url.split('/object/public/photos/')[1];
  if(!path)return;
  try{await fetch(SB_URL+'/storage/v1/object/Photos/'+path,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});}catch(e){}
}
async function handlePhotoUpload(event){
  var files=Array.from(event.target.files);
  var tempId=editingId||('temp-'+uid());
  for(var i=0;i<files.length;i++){
    try{var url=await uploadPhotoToStorage(files[i],tempId);modalPhotos.push(url);renderModalPreviews();}
    catch(e){alert('Photo upload failed');}
  }
  event.target.value='';
}
function renderModalPreviews(){
  var wrap=document.getElementById('modal-photo-previews');
  if(!wrap)return; wrap.innerHTML='';
  modalPhotos.forEach(function(p,i){
    var w=document.createElement('div');w.className='modal-thumb-wrap';
    var img=document.createElement('img');img.className='modal-thumb';img.src=p;
    var del=document.createElement('button');del.className='modal-thumb-del';del.textContent='✕';
    del.onclick=function(){modalPhotos.splice(i,1);renderModalPreviews();};
    w.appendChild(img);w.appendChild(del);wrap.appendChild(w);
  });
}
function triggerCardPhotoAdd(cat,id){var inp=document.getElementById('cpi-'+id);if(inp)inp.click();}
async function handleCardPhotoAdd(event,cat,id){
  var files=Array.from(event.target.files);
  var entry=data[cat].find(function(e){return e.id===id;});
  if(!entry)return; if(!entry.photos)entry.photos=[];
  for(var i=0;i<files.length;i++){
    try{var url=await uploadPhotoToStorage(files[i],id);entry.photos.push(url);
      try{await sbFetch('/rest/v1/travel?id=eq.'+id,{method:'PATCH',body:JSON.stringify({photos:JSON.stringify(entry.photos)})});}catch(ex){}
      saveLocal();renderSection(cat);
    }catch(e){alert('Upload failed');}
  }
  event.target.value='';
}

// LIGHTBOX
function openLightbox(cat,id,idx){
  var entry=data[cat].find(function(e){return e.id===id;});
  if(!entry||!entry.photos||!entry.photos.length)return;
  lbPhotos=entry.photos;lbIndex=idx;lbCat=cat;lbEntryId=id;
  showLbPhoto();document.getElementById('lightbox').classList.add('open');
}
function showLbPhoto(){document.getElementById('lb-img').src=lbPhotos[lbIndex];document.getElementById('lb-counter').textContent=(lbIndex+1)+' / '+lbPhotos.length;}
function lbNav(dir){lbIndex=(lbIndex+dir+lbPhotos.length)%lbPhotos.length;showLbPhoto();}
async function lbDelete(){
  if(!confirm('Delete this photo?'))return;
  var entry=data[lbCat].find(function(e){return e.id===lbEntryId;});
  if(entry){var url=entry.photos[lbIndex];entry.photos.splice(lbIndex,1);
    await deletePhotoFromStorage(url);
    try{await sbFetch('/rest/v1/travel?id=eq.'+lbEntryId,{method:'PATCH',body:JSON.stringify({photos:JSON.stringify(entry.photos)})});}catch(ex){}
    saveLocal();
    if(!entry.photos.length){closeLightbox();renderSection(lbCat);return;}
    lbPhotos=entry.photos;lbIndex=Math.min(lbIndex,lbPhotos.length-1);showLbPhoto();renderSection(lbCat);
  }
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.getElementById('lightbox').addEventListener('click',function(e){if(e.target===this)closeLightbox();});
var lbTouchX=null;
document.getElementById('lightbox').addEventListener('touchstart',function(e){lbTouchX=e.touches[0].clientX;},{passive:true});
document.getElementById('lightbox').addEventListener('touchend',function(e){
  if(lbTouchX===null)return;var dx=e.changedTouches[0].clientX-lbTouchX;
  if(Math.abs(dx)>50)lbNav(dx<0?1:-1);lbTouchX=null;
},{passive:true});
document.addEventListener('keydown',function(e){
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbNav(-1);if(e.key==='ArrowRight')lbNav(1);if(e.key==='Escape')closeLightbox();
});

// EXPORT / IMPORT
function exportData(){
  var exp=JSON.parse(JSON.stringify(data));
  var blob=new Blob([JSON.stringify(exp,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ahmads-travel-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
async function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var imported=JSON.parse(e.target.result);
      var cats=['countries','cities','landmarks','beaches','hotels','food'];
      for(var c=0;c<cats.length;c++){
        for(var i=0;i<(imported[cats[c]]||[]).length;i++){
          var item=imported[cats[c]][i];
          var sbRow={id:item.id,cat:cats[c],title:item.title,status:item.status,budget:item.budget||'',date_visited:item.date||'',who_with:item.who||'',rating:item.rating||0,thoughts:item.thoughts||'',memories:item.memories||'',tips:item.tips||'',todos:JSON.stringify(item.todos||[]),photos:JSON.stringify(item.photos||[]),extra:JSON.stringify(item.extra||{})};
          try{await sbFetch('/rest/v1/travel',{method:'POST',body:JSON.stringify(sbRow)});}catch(ex){}
        }
      }
      await loadAll();alert('Data restored!');
    }catch(err){alert('Could not read file');}
  };
  reader.readAsText(file);event.target.value='';
}

// also need to add extra column — run this in Supabase if not already done
loadAll();
